<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style-profile.css">
<title>CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: #f5f3ee;
    color: #2a2a2a;
  }

  
</style>
</head>
<body>

<!-- NAV (exact structure from promt.txt) -->
<div class="topnav" id="myTopnav">
  <a href="#home" class="active">Home</a>
  <a href="#profile">Skills</a>
  <a href="#contact">Contact</a>
  <a href="#about">About</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<!-- HERO SECTION -->
<div id="home">
  <div class="hero-grid row-2 content-grid">

    <div class="grid-item hero-text">
      <span class="tag">Portfolio</span>
      <h1>Zain Ammar <br> Python Django Developer</h1>
      <h2 class="kala">Crafting clean code and seamless web experiences.</h2>
      <a href="#contact" class="btn">Get In Touch</a>
   
    </div>

    <div class="grid-item hero-image-wrap">
      <div class="profile-frame">
        <!-- Google Drive profile image using direct embed URL zain-3.png -->
        <img
          src="images/zain-3.png"
          alt="Profile Photo"
          onerror="this.onerror=null; this.src=''; this.parentElement.style.background='#2a2a2a'; this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-family:Playfair Display,serif;font-size:1.3rem;color:#c9a96e;\'>Profile Photo</div>'"
        >
      </div>
    </div>

  </div>
</div>







<!-- FOOTER -->
<footer>
    <p>Designed &amp; Built with <span>&#9825;</span> — &copy; 2025 Your Name</p>
    <div class="social-links">
      <a href="#"><i class="fa fa-twitter"></i></a>
      <a href="#"><i class="fa fa-linkedin"></i></a>
      <a href="#"><i class="fa fa-github"></i></a>
      <a href="#"><i class="fa fa-dribbble"></i></a>
      <a href="#"><i class="fa fa-instagram"></i></a>
    </div>
  </footer>
  
  <script>
  function myFunction() {
    var x = document.getElementById("myTopnav");
    if (x.className === "topnav") {
      x.className += " responsive";
    } else {
      x.className = "topnav";
    }
  }
  
  /* smooth scroll */
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const target = document.querySelector(a.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth' });
      }
      if (document.getElementById('myTopnav').className.includes('responsive')) {
        document.getElementById('myTopnav').className = 'topnav';
      }
    });
  });
  
  /* active nav highlight on scroll */
  const sections = document.querySelectorAll('[id]');
  const navLinks = document.querySelectorAll('.topnav a:not(.icon)');
  window.addEventListener('scroll', () => {
    let current = '';
    sections.forEach(s => {
      if (window.scrollY >= s.offsetTop - 80) current = s.id;
    });
    navLinks.forEach(a => {
      a.classList.remove('active');
      if (a.getAttribute('href') === '#' + current) a.classList.add('active');
    });
  });
  </script>
  </body>
  </html>
